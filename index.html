<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROC VISUAL | ASCENDANCE CORE PRO</title>
    <!-- SEO & Metadata -->
    <meta name="description" content="Portal inmobiliario de lujo por Roc Visual. Encuentra las mejores propiedades con tecnología IA.">
    <meta name="keywords" content="inmobiliaria, lujo, roc visual, ascendance, real estate, ia">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f7ff;
            --secondary: #6366f1;
            --accent: #ff007a;
            --bg: #030510;
            --card-bg: rgba(16, 20, 40, 0.7);
            --text: #e6f1ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, transparent 50%);
        }

        /* Hero & Header */
        header {
            padding: 40px 20px;
            text-align: center;
            background: rgba(3, 5, 16, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 247, 255, 0.1);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 247, 255, 0.3);
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        /* Navigation / Social bars */
        .top-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .btn-social {
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-fb { background: #1877f2; }
        .btn-wa { background: #25d366; }
        .btn-social:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        /* Listing Controls */
        .controls {
            max-width: 1200px;
            margin: 30px auto;
            padding: 25px;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            backdrop-filter: blur(20px);
        }

        input, select, textarea {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 15px;
            border-radius: 12px;
            color: white;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--primary); outline: none; }

        .btn-action {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action:hover { opacity: 0.9; transform: scale(1.02); }

        /* Grid */
        #list {
            max-width: 1200px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            padding: 0 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            filter: brightness(0.8);
            transition: 0.5s;
        }

        .card:hover img { filter: brightness(1.1); }

        .card-body { padding: 20px; }

        .card h3 { font-size: 1.4rem; margin-bottom: 8px; }

        .price-tag {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .location { font-size: 0.8rem; color: #8892b0; display: flex; align-items: center; gap: 5px; margin-bottom: 12px; }

        .badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
        }

        .fav-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(16, 20, 40, 0.8);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
        }

        .fav-btn.active { color: #ffcc00; background: white; }

        /* Footer */
        footer {
            padding: 60px 20px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 100px;
            opacity: 0.4;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <h1>ROC VISUAL</h1>
    <div class="subtitle">Ascendance Core Pro | Luxury Real Estate</div>
    
    <div class="top-bar">
        <a href="https://www.facebook.com/rafael.oltracreu.5" class="btn-social btn-fb" target="_blank">Facebook</a>
        <a href="https://wa.me/34687588143" class="btn-social btn-wa" target="_blank">WhatsApp</a>
    </div>
</header>

<div class="container">
    
    <!-- CONTROLES -->
    <div class="controls">
        <select id="typeFilter">
            <option value="">Todas las Operaciones</option>
            <option value="venta">Venta</option>
            <option value="alquiler">Alquiler</option>
        </select>
        <input type="number" id="maxPrice" placeholder="Presupuesto Máx €">
        <button class="btn-action" onclick="render()">Filtrar Catálogo</button>
        <button class="btn-action" style="background: rgba(255,255,255,0.1);" onclick="toggleFavView()">Mis Favoritos</button>
    </div>

    <!-- FORMULARIO DE ALTA (Simulado para Admin) -->
    <div class="controls" style="margin-top: 10px; background: rgba(0, 247, 255, 0.03);">
        <input id="title" placeholder="Título Propiedad">
        <input id="price" type="number" placeholder="Precio €">
        <input id="location" placeholder="Ubicación">
        <select id="type">
            <option value="venta">Venta</option>
            <option value="alquiler">Alquiler</option>
        </select>
        <input id="image" placeholder="URL Foto (HD)">
        <textarea id="desc" placeholder="Descripción detallada..."></textarea>
        <button class="btn-action" onclick="addProperty()">Publicar Activo</button>
    </div>

    <!-- LISTADO DINAMICO -->
    <div id="list"></div>

</div>

<footer>
    © 2026 ROC AGENT AGENCY | Rafael Oltra - Todos los derechos reservados.<br>
    Sincronizado con Motor Roc y KITT.
</footer>

<script>
    // DATA MOCK (Inicial)
    let data = JSON.parse(localStorage.getItem('roc_properties')) || [
        {id:1, title:"Ático Premium", type:"venta", price:450000, location:"Barcelona, Diagonal", desc:"Vistas 360 y acabados de lujo.", image:"https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=800&q=80"},
        {id:2, title:"Villa Futurista", type:"venta", price:1200000, location:"Marbella", desc:"Piscina infinity y domótica total.", image:"https://images.unsplash.com/photo-1613490493576-7fde63acd811?auto=format&fit=crop&w=800&q=80"},
        {id:3, title:"Loft Industrial", type:"alquiler", price:2200, location:"Madrid, Malasaña", desc:"Ideal para nómadas digitales del sector Tech.", image:"https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?auto=format&fit=crop&w=800&q=80"}
    ];

    let favs = JSON.parse(localStorage.getItem('roc_favs')) || [];
    let showFavs = false;

    function save() {
        localStorage.setItem('roc_properties', JSON.stringify(data));
    }

    function render() {
        const typeF = document.getElementById('typeFilter').value;
        const priceF = document.getElementById('maxPrice').value;
        const container = document.getElementById('list');

        let filtered = data.filter(p => 
            (!typeF || p.type === typeF) && 
            (!priceF || p.price <= priceF)
        );

        if (showFavs) filtered = filtered.filter(p => favs.includes(p.id));

        container.innerHTML = filtered.map(p => `
            <div class="card">
                <div class="badge">${p.type}</div>
                <div class="fav-btn ${favs.includes(p.id) ? 'active' : ''}" onclick="toggleFav(${p.id})">★</div>
                <img src="${p.image}" alt="${p.title}">
                <div class="card-body">
                    <div class="price-tag">${p.price.toLocaleString()} €</div>
                    <h3>${p.title}</h3>
                    <div class="location">📍 ${p.location}</div>
                    <p style="font-size: 0.9rem; opacity: 0.8;">${p.desc}</p>
                    <button class="btn-action" style="margin-top: 15px; width: 100%;" onclick="window.open('https://wa.me/34687588143?text=Interesado en ${p.title}')">Solicitar Información</button>
                </div>
            </div>
        `).join('');
    }

    function addProperty() {
        if(!title.value || !price.value) return alert("Por favor, rellena los campos principales.");
        const newP = {
            id: Date.now(),
            title: title.value,
            price: Number(price.value),
            type: type.value,
            location: location.value || "Ubicación reservada",
            image: image.value || "https://via.placeholder.com/800x600/101428/00f7ff?text=Roc+Visual+Assets",
            desc: desc.value || "Sin descripción disponible."
        };
        data.push(newP);
        save();
        render();
        // Limpiar
        title.value = ""; price.value = ""; location.value = ""; desc.value = "";
    }

    function toggleFav(id) {
        favs = favs.includes(id) ? favs.filter(i => i !== id) : [...favs, id];
        localStorage.setItem('roc_favs', JSON.stringify(favs));
        render();
    }

    function toggleFavView() {
        showFavs = !showFavs;
        render();
    }

    render();
</script>
</body>
</html>
